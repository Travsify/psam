<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSAM Reunion 2026 · Abuja Grand Hall</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="geometric-overlay"></div>
    
    <div class="container">
        <header>
            <div style="background: rgba(131, 48, 255, 0.1); border: 1px solid rgba(131, 48, 255, 0.2); color: var(--accent-primary); padding: 0.5rem 1.5rem; border-radius: 100px; display: inline-block; font-size: 0.8rem; font-weight: 700; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 0.1em;">
                Great People, Great Future
            </div>
            <h1 id="header-title">PSAM Class of 12/14</h1>
            <h2 id="header-subtitle">Reunion 2026 &middot; Abuja, Nigeria</h2>
            <div id="global-stats" style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 2rem;"></div>
        </header>

        <main id="main-content"></main>

        <div class="progress-container" id="progress-container" style="margin-top: 3rem; display:none;">
            <div class="progress-fill" id="progress-fill"></div>
        </div>

        <div id="poll-container" style="margin-top: 2rem;"></div>

        <footer>
            <div class="footer-icon">🎓</div>
            <span class="school-motto">Excellence Through Unity</span>
            <p class="footer-tag">Perfect Success Academy Masaka &middot; Reunion Committee 2026</p>
        </footer>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" id="nav-home" onclick="setMode('home')">
            <i>🏠</i>
            <span>Home</span>
        </div>
        <div class="nav-item" id="nav-itinerary" onclick="setMode('itinerary')">
            <i>📅</i>
            <span>Itinerary</span>
        </div>
        <div class="nav-item" id="nav-voting" onclick="setMode('voting')">
            <i>🗳️</i>
            <span>Voting</span>
        </div>
        <div class="nav-item" id="nav-games" onclick="setMode('games')">
            <i>🎮</i>
            <span>Games</span>
        </div>
        <div class="nav-item" id="nav-hall" onclick="setMode('hall-of-fame')">
            <i>🏆</i>
            <span>Standings</span>
        </div>
    </nav>

    <div id="toast" class="toast"><div class="toast-content"><span id="toast-message"></span></div></div>

    <script src="script.js"></script>
</body>
</html>
