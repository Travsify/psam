<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSAM Class of 2012-2014 · The Alumni Grand Hall</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="geometric-overlay"></div>
    
    <div class="container">
        <header>
            <div style="background: rgba(131, 48, 255, 0.1); border: 1px solid rgba(131, 48, 255, 0.2); color: var(--accent-primary); padding: 0.5rem 1.5rem; border-radius: 100px; display: inline-block; font-size: 0.8rem; font-weight: 700; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 0.1em;">
                Great People, Great Future
            </div>
            <h1>Perfect Success Academy Masaka</h1>
            <h2>Class of 2012&ndash;2014 &middot; Grand Hall</h2>
            <div id="global-stats" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;"></div>
        </header>

        <main id="main-content">
            <!-- Dynamic Content -->
        </main>

        <div class="progress-container" id="progress-container" style="margin-top: 3rem;">
            <div class="progress-fill" id="progress-fill"></div>
        </div>

        <div id="poll-container" style="margin-top: 2rem;"></div>

        <footer>
            <div class="footer-icon">🎓</div>
            <span class="school-motto">Great People, Great Future</span>
            <p class="footer-tag">Perfect Success Academy Masaka &copy; 2026</p>
            <p class="footer-tag" style="margin-top: 0.5rem;">Class of 2012 - 2014 Reunion Committee</p>
        </footer>
    </div>

    <!-- Toast Notifications -->
    <div id="toast" class="toast">
        <div class="toast-content">
            <span id="toast-message"></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
